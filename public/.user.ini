; PHP-FPM per-directory overrides (cPanel shared/VPS hosting).
; Applies to PHP-FPM only — Apache mod_php reads .htaccess instead.
; Max single file upload size (must be <= post_max_size).
upload_max_filesize = 20M
; Max total POST body. Must be larger than upload_max_filesize
; to leave room for form fields alongside the file.
post_max_size = 22M
